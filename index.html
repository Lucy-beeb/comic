<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动漫照片墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background-color: #e3fde3;
            overflow-x: hidden;
        }
        .photo-container {
            position: relative;
            min-height: 100vh;
        }
        /* 通用照片卡片样式 */
        .photo-item {
            position: absolute;
            width: 400px;
            transition: transform 0.3s ease-out, z-index 0.3s;
        }
        .photo-item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border: 10px solid #fbd7b9;
        }
        .photo-item:hover {
            transform: scale(1.05);
            z-index: 99;
        }

        /* 分别设置每张图片位置 */
        .p1 { top: 100px; left: 250px; }
        .p2 { top: 300px; right: 300px; }
        .p3 { top: 600px; left: 400px; }
        .p4 { top: 700px; right: 200px; }
        .p5 { top: 1050px; right: 500px; }
        .p6 { top: 1000px; left: 100px; }
        .p7 { top: 1550px; right: 700px; }

        /* 手机适配 */
        @media (max-width: 900px) {
            .photo-item {
                width: 70vw !important;
                position: relative !important;
                margin: 30px auto !important;
                left: auto !important;
                right: auto !important;
                top: auto !important;
            }
            .photo-container {
                padding: 40px 0;
            }
        }
    </style>
</head>
<body>
    <div class="photo-container">
        <div class="photo-item p1">
            <!-- 注意路径斜杠改成 / -->
            <img src="忍/7.png" alt="图片丢失">
        </div>
        <div class="photo-item p2">
            <img src="忍/8.jpg" alt="图片丢失">
        </div>
        <div class="photo-item p3">
            <img src="忍/1.png" alt="图片丢失">
        </div>
        <div class="photo-item p4">
            <img src="忍/2.png" alt="图片丢失">
        </div>
        <div class="photo-item p5">
            <img src="忍/3.png" alt="图片丢失">
        </div>
        <div class="photo-item p6">
            <img src="忍/4.png" alt="图片丢失">
        </div>
        <div class="photo-item p7">
            <img src="忍/5.jpg" alt="图片丢失">
        </div>
    </div>
</body>
</html>
